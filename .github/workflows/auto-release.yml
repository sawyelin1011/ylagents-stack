name: Auto Release — Android / iOS / Windows

on:
  push:
    branches: [main, master]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android APK'
        type: boolean
        default: true
      build_ios:
        description: 'Build iOS (unsigned .ipa)'
        type: boolean
        default: true
      build_windows:
        description: 'Build Windows .zip + installer'
        type: boolean
        default: true
      publish_release:
        description: 'Publish to GitHub Release'
        type: boolean
        default: true
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

env:
  FLUTTER_VERSION: '3.44.2'

permissions:
  contents: write
  packages: write

jobs:
  #############################################################################
  # Quality Gates
  #############################################################################
  quality:
    name: Analyze / Format / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Linux deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            clang cmake ninja-build pkg-config libgtk-3-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libkeybinder-3.0-dev libayatana-appindicator3-dev \
            libmpg123-dev

      - run: flutter pub get

      - name: Inject fallback secrets
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Dart format check
        run: |
          dart format lib/ test/
          git diff --exit-code || (echo "Formatting issues found. Run 'dart format lib/ test/' locally." && exit 1)

      - name: Dart analyze
        run: dart analyze --fatal-infos lib test

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Verify l10n committed
        run: git diff --exit-code -- lib/l10n || (echo "Generated l10n files differ from committed. Run 'flutter gen-l10n' locally." && exit 1)

      - name: Run tests
        run: flutter test

  #############################################################################
  # Version Resolution
  #############################################################################
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    needs: quality
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_number: ${{ steps.version.outputs.version_number }}
      is_release: ${{ steps.version.outputs.is_release }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        run: |
          set -euo pipefail
          RAW=$(grep 'version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          VERSION_NUMBER=$(echo "$RAW" | cut -d'+' -f1)
          SHA=$(git rev-parse --short HEAD)

          IS_RELEASE="false"
          TAG_NAME=""

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            IS_RELEASE="true"
            VERSION="$RAW"
            TAG_NAME="${{ github.ref_name }}"
          elif [[ "${{ github.event.inputs.publish_release }}" == "true" ]]; then
            IS_RELEASE="true"
            VERSION="$RAW"
            TAG_NAME="v${VERSION_NUMBER}"
          else
            VERSION="${RAW}_${SHA}"
            TAG_NAME="auto-${VERSION}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_number=$VERSION_NUMBER" >> "$GITHUB_OUTPUT"
          echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

          echo "Resolved VERSION=$VERSION"
          echo "Resolved TAG_NAME=$TAG_NAME"
          echo "IS_RELEASE=$IS_RELEASE"

  #############################################################################
  # Android
  #############################################################################
  android:
    name: Android APK
    needs: version
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_android == 'true')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve version
        run: |
          echo "VERSION=${{ needs.version.outputs.version }}" >> $GITHUB_ENV
          echo "VERSION_NUMBER=${{ needs.version.outputs.version_number }}" >> $GITHUB_ENV

      - name: Inject fallback secrets
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Setup Android signing
        if: ${{ secrets.SIGN_KEYSTORE_BASE64 != '' }}
        env:
          SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
        run: |
          echo "$SIGN_KEYSTORE_BASE64" | base64 --decode > android/app/key.jks
          cat > android/key.properties <<PROPS
          storeFile=key.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          PROPS

      - run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          for f in app-*-release.apk; do
            abi=$(echo "$f" | sed -E 's/app-(.*)-release\.apk/\1/')
            mv "$f" "Kelivo_android_${{ env.VERSION }}_${abi}.apk"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: Android-APKs
          path: build/app/outputs/flutter-apk/Kelivo_android_*.apk

  #############################################################################
  # iOS
  #############################################################################
  ios:
    name: iOS IPA (unsigned)
    needs: version
    runs-on: macos-latest
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_ios == 'true')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter config --no-enable-swift-package-manager

      - name: Resolve version
        run: |
          echo "VERSION=${{ needs.version.outputs.version }}" >> $GITHUB_ENV

      - name: Inject fallback secrets
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - run: flutter build ios --release --no-codesign

      - name: Package .ipa
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r "../../../Kelivo_ios_${{ env.VERSION }}.ipa" Payload

      - uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: Kelivo_ios_*.ipa

  #############################################################################
  # Windows
  #############################################################################
  windows:
    name: Windows (ZIP + Installer)
    needs: version
    runs-on: windows-latest
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_windows == 'true')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: lukka/get-cmake@latest

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve version
        run: |
          $env:VERSION = "${{ needs.version.outputs.version }}"
          $env:VERSION_NUMBER = "${{ needs.version.outputs.version_number }}"
          echo "VERSION=$env:VERSION" >> $env:GITHUB_ENV

      - name: Inject fallback secrets
        shell: bash
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "Kelivo_windows_$env:VERSION.zip"

      - name: Inno Setup installer
        shell: pwsh
        run: |
          $langDir = Join-Path (Get-Location) "Languages"
          $langFile = Join-Path $langDir "ChineseSimplified.isl"
          $langBlock = ""
          try {
            New-Item -ItemType Directory -Force -Path $langDir | Out-Null
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/ChineseSimplified.isl" -OutFile $langFile -UseBasicParsing -TimeoutSec 30
            $langBlock = @"
          [Languages]
          Name: "chinesesimplified"; MessagesFile: "$langFile"
          Name: "english"; MessagesFile: "compiler:Default.isl"
          "@
          } catch {
            $langBlock = "[Languages]`nName: `"english`"; MessagesFile: `"compiler:Default.isl`""
          }
          @"
          #define MyAppName "Kelivo"
          #define MyAppVersion "$env:VERSION"
          #define MyAppPublisher "Psyche"
          #define MyAppExeName "kelivo.exe"
          [Setup]
          AppId={{A7B8C9D0-E1F2-4A5B-8C9D-0E1F2A3B4C5D}}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          DefaultDirName={autopf}\{#MyAppName}
          DefaultGroupName={#MyAppName}
          OutputDir=.
          OutputBaseFilename=Kelivo_windows_{#MyAppVersion}_setup
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          ArchitecturesInstallIn64BitMode=x64
          $langBlock
          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          [Icons]
          Name: "{group}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
          Name: "{group}\Uninstall {#MyAppName}"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon
          [Tasks]
          Name: "desktopicon"; Description: "Create desktop shortcut"
          [Run]
          Filename: "{app}\{#MyAppExeName}"; Flags: nowait postinstall skipifsilent
          "@ | Out-File -FilePath "installer.iss" -Encoding utf8BOM
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer.iss"

      - uses: actions/upload-artifact@v4
        with:
          name: Windows-ZIP
          path: Kelivo_windows_*.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Windows-Installer
          path: Kelivo_windows_*_setup.exe

  #############################################################################
  # Release
  #############################################################################
  release:
    name: Publish GitHub Release
    needs: [version, android, ios, windows]
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -name "Kelivo_android_*.apk" -exec cp {} release/ \;
          find artifacts -name "Kelivo_ios_*.ipa" -exec cp {} release/ \;
          find artifacts -name "Kelivo_windows_*.zip" -exec cp {} release/ \;
          find artifacts -name "Kelivo_windows_*_setup.exe" -exec cp {} release/ \;
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag_name }}
          name: ${{ needs.version.outputs.tag_name }}
          prerelease: ${{ needs.version.outputs.is_release != 'true' || github.event.inputs.prerelease == 'true' }}
          files: release/*
