name: Build & Release

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android APK'
        type: boolean
        default: true
      build_ios:
        description: 'Build iOS (unsigned .ipa)'
        type: boolean
        default: false
      build_macos:
        description: 'Build macOS .dmg'
        type: boolean
        default: false
      build_windows:
        description: 'Build Windows .zip + installer'
        type: boolean
        default: false
      build_linux:
        description: 'Build Linux (tar.gz, AppImage, DEB, RPM)'
        type: boolean
        default: true
      build_linux_arm64:
        description: 'Build Linux ARM64'
        type: boolean
        default: false
      publish_release:
        description: 'Publish to GitHub Release'
        type: boolean
        default: false
      release_tag:
        description: 'Release tag (e.g. v1.0.0) — required if publish_release=true'
        type: string
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

  push:
    tags:
      - 'v*.*.*'

env:
  FLUTTER_VERSION: '3.44.2'

permissions: write-all

jobs:
  #############################################################################
  # Android
  #############################################################################
  android:
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.build_android == 'true')
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve version
        id: version
        run: |
          IS_RELEASE="false"
          if [[ "${{ github.ref }}" == refs/tags/v* ]] || [[ "${{ github.event.inputs.publish_release }}" == "true" ]]; then
            IS_RELEASE="true"
          fi
          echo "IS_RELEASE=$IS_RELEASE" >> $GITHUB_ENV
          RAW=$(grep 'version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          if [ "$IS_RELEASE" != "true" ]; then
            SHA=$(git rev-parse --short HEAD)
            VERSION="${RAW}_${SHA}"
          else
            VERSION="$RAW"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_NUMBER=$(echo $RAW | cut -d'+' -f1)" >> $GITHUB_ENV

      - name: Inject fallback secrets
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Setup Android signing
        env:
          SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$SIGN_KEYSTORE_BASE64" ]; then
            echo "No signing keystore configured, building unsigned APK"
            exit 0
          fi
          echo "$SIGN_KEYSTORE_BASE64" | base64 --decode > android/app/key.jks
          cat > android/key.properties <<PROPS
          storeFile=key.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          PROPS

      - run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          for f in app-*-release.apk; do
            abi=$(echo "$f" | sed -E 's/app-(.*)-release\.apk/\1/')
            mv "$f" "Kelivo_android_${VERSION}_${abi}.apk"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Android-APKs
          path: build/app/outputs/flutter-apk/Kelivo_android_*.apk

      - name: Publish release
        if: env.IS_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: ${{ github.event.inputs.release_tag || github.ref_name }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: build/app/outputs/flutter-apk/Kelivo_android_*.apk

  #############################################################################
  # iOS
  #############################################################################
  ios:
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.build_ios == 'true')
    name: iOS IPA (unsigned)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter config --no-enable-swift-package-manager

      - name: Inject fallback secrets
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Resolve version
        run: |
          RAW=$(grep 'version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          if [ "$IS_RELEASE" != "true" ]; then
            SHA=$(git rev-parse --short HEAD)
            VERSION="${RAW}_${SHA}"
          else
            VERSION="$RAW"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - run: flutter build ios --release --no-codesign

      - name: Package .ipa
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r "../../../Kelivo_ios_${VERSION}.ipa" Payload

      - uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: Kelivo_ios_*.ipa

      - name: Publish release
        if: env.IS_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: ${{ github.event.inputs.release_tag || github.ref_name }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: Kelivo_ios_*.ipa

  #############################################################################
  # macOS
  #############################################################################
  macos:
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.build_macos == 'true')
    name: macOS DMG
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter config --no-enable-swift-package-manager

      - name: Inject fallback secrets
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Resolve version
        run: |
          RAW=$(grep 'version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          if [ "$IS_RELEASE" != "true" ]; then
            SHA=$(git rev-parse --short HEAD)
            VERSION="${RAW}_${SHA}"
          else
            VERSION="$RAW"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_NUMBER=$(echo $RAW | cut -d'+' -f1)" >> $GITHUB_ENV

      - run: flutter build macos --release

      - name: Create DMG
        run: |
          brew install create-dmg 2>/dev/null || true
          create-dmg \
            --volname "Kelivo" \
            --window-pos 200 120 --window-size 800 400 \
            --icon-size 100 --app-drop-link 600 185 \
            "Kelivo_macos_${VERSION}.dmg" \
            "build/macos/Build/Products/Release/kelivo.app" || \
          hdiutil create -volname Kelivo \
            -srcfolder build/macos/Build/Products/Release/kelivo.app \
            -ov -format UDZO "Kelivo_macos_${VERSION}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macOS-DMG
          path: Kelivo_macos_*.dmg

      - name: Publish release
        if: env.IS_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: ${{ github.event.inputs.release_tag || github.ref_name }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: Kelivo_macos_*.dmg

  #############################################################################
  # Windows
  #############################################################################
  windows:
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.build_windows == 'true')
    name: Windows (ZIP + Installer)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: lukka/get-cmake@latest

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Inject fallback secrets
        shell: bash
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - run: flutter pub get

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $isRelease = "false"
          if ("${{ github.ref }}" -like "refs/tags/v*" -or "${{ github.event.inputs.publish_release }}" -eq "true") {
            $isRelease = "true"
          }
          echo "IS_RELEASE=$isRelease" >> $env:GITHUB_ENV
          $raw = (Select-String -Path pubspec.yaml -Pattern "version:" | ForEach-Object { $_.Line.Split(":")[1].Trim() })
          if ($isRelease -ne "true") {
            $sha = git rev-parse --short HEAD
            $version = "$raw`_$sha"
          } else {
            $version = $raw
          }
          echo "VERSION=$version" >> $env:GITHUB_ENV
          echo "VERSION_NUMBER=$($raw.Split('+')[0])" >> $env:GITHUB_ENV

      - run: flutter build windows --release

      - name: Package ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "Kelivo_windows_$env:VERSION.zip"

      - name: Inno Setup installer
        shell: pwsh
        run: |
          # Download ChineseSimplified language file if needed
          $langDir = Join-Path (Get-Location) "Languages"
          $langFile = Join-Path $langDir "ChineseSimplified.isl"
          $langBlock = ""
          try {
            New-Item -ItemType Directory -Force -Path $langDir | Out-Null
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/ChineseSimplified.isl" -OutFile $langFile -UseBasicParsing -TimeoutSec 30
            $langBlock = @"
          [Languages]
          Name: "chinesesimplified"; MessagesFile: "$langFile"
          Name: "english"; MessagesFile: "compiler:Default.isl"
          "@
          } catch {
            $langBlock = "[Languages]`nName: `"english`"; MessagesFile: `"compiler:Default.isl`""
          }
          @"
          #define MyAppName "Kelivo"
          #define MyAppVersion "$env:VERSION"
          #define MyAppPublisher "Psyche"
          #define MyAppExeName "kelivo.exe"
          [Setup]
          AppId={{A7B8C9D0-E1F2-4A5B-8C9D-0E1F2A3B4C5D}}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          DefaultDirName={autopf}\{#MyAppName}
          DefaultGroupName={#MyAppName}
          OutputDir=.
          OutputBaseFilename=Kelivo_windows_{#MyAppVersion}_setup
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          ArchitecturesInstallIn64BitMode=x64
          $langBlock
          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          [Icons]
          Name: "{group}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
          Name: "{group}\Uninstall {#MyAppName}"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon
          [Tasks]
          Name: "desktopicon"; Description: "Create desktop shortcut"
          [Run]
          Filename: "{app}\{#MyAppExeName}"; Flags: nowait postinstall skipifsilent
          "@ | Out-File -FilePath "installer.iss" -Encoding utf8BOM
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer.iss"

      - uses: actions/upload-artifact@v4
        with:
          name: Windows-ZIP
          path: Kelivo_windows_*.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Windows-Installer
          path: Kelivo_windows_*_setup.exe

      - name: Publish release
        if: env.IS_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: ${{ github.event.inputs.release_tag || github.ref_name }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: |
            Kelivo_windows_*.zip
            Kelivo_windows_*_setup.exe

  #############################################################################
  # Linux x86_64
  #############################################################################
  linux:
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.build_linux == 'true')
    name: Linux x86_64 (tar.gz + AppImage + DEB + RPM)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            clang cmake ninja-build pkg-config libgtk-3-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            libkeybinder-3.0-dev libayatana-appindicator3-dev \
            libmpg123-dev rpm patchelf libfuse2 file

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Inject fallback secrets
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Resolve version
        run: |
          RAW=$(grep 'version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          if [ "$IS_RELEASE" != "true" ]; then
            SHA=$(git rev-parse --short HEAD)
            VERSION="${RAW}_${SHA}"
          else
            VERSION="$RAW"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_NUMBER=$(echo $RAW | cut -d'+' -f1)" >> $GITHUB_ENV

      - run: flutter build linux --release

      - name: Package tar.gz
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../Kelivo_linux_${VERSION}.tar.gz .

      - name: Package AppImage
        run: |
          wget -q -O appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/kelivo" "$@"
          EOF
          chmod +x AppDir/AppRun
          cat > AppDir/kelivo.desktop << EOF
          [Desktop Entry]
          Name=Kelivo
          Exec=kelivo
          Icon=kelivo
          Type=Application
          Categories=Utility;
          EOF
          ICON="assets/app_icon.png"
          [ -f "linux/kelivo.png" ] && ICON="linux/kelivo.png"
          install -Dm644 "$ICON" AppDir/kelivo.png
          install -Dm644 "$ICON" "AppDir/usr/share/icons/hicolor/256x256/apps/kelivo.png"
          ARCH=x86_64 ./appimagetool AppDir Kelivo_linux_${VERSION}.AppImage

      - name: Package DEB
        run: |
          mkdir -p deb/DEBIAN deb/opt/kelivo deb/usr/bin deb/usr/share/applications deb/usr/share/icons/hicolor/256x256/apps
          cp -r build/linux/x64/release/bundle/* deb/opt/kelivo/
          ln -s /opt/kelivo/kelivo deb/usr/bin/kelivo
          cat > deb/DEBIAN/control << EOF
          Package: kelivo
          Version: ${VERSION_NUMBER}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Psyche <your@email.com>
          Depends: libgtk-3-0, libstdc++6, libglu1-mesa, libgstreamer1.0-0, libgstreamer-plugins-base1.0-0, libglib2.0-0, libc6
          Description: Kelivo - An LLM chat client
          EOF
          cat > deb/usr/share/applications/kelivo.desktop << EOF
          [Desktop Entry]
          Name=Kelivo
          Exec=kelivo
          Icon=kelivo
          Type=Application
          Categories=Utility;
          EOF
          ICON="assets/app_icon.png"; [ -f "linux/kelivo.png" ] && ICON="linux/kelivo.png"
          install -Dm644 "$ICON" deb/usr/share/icons/hicolor/256x256/apps/kelivo.png
          dpkg-deb --build deb Kelivo_linux_${VERSION}_amd64.deb

      - name: Package RPM
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS} kelivo-${VERSION_NUMBER}
          cp -r build/linux/x64/release/bundle/* kelivo-${VERSION_NUMBER}/
          ICON="assets/app_icon.png"; [ -f "linux/kelivo.png" ] && ICON="linux/kelivo.png"
          cp "$ICON" kelivo-${VERSION_NUMBER}/kelivo.png
          tar -czf ~/rpmbuild/SOURCES/kelivo-${VERSION_NUMBER}.tar.gz kelivo-${VERSION_NUMBER}
          cat > ~/rpmbuild/SPECS/kelivo.spec << EOF
          Name: kelivo
          Version: ${VERSION_NUMBER}
          Release: 1%{?dist}
          Summary: Kelivo LLM Chat Client
          License: MIT
          Source0: %{name}-%{version}.tar.gz
          BuildArch: x86_64
          Requires: gtk3, libstdc++ >= 6, mesa-libGLU, gstreamer1, gstreamer1-plugins-base, glib2, glibc
          %description
          An LLM chat client built with Flutter.
          %prep
          %setup -q
          %install
          mkdir -p %{buildroot}/opt/kelivo %{buildroot}/usr/bin
          cp -r * %{buildroot}/opt/kelivo/
          ln -s /opt/kelivo/kelivo %{buildroot}/usr/bin/kelivo
          mkdir -p %{buildroot}/usr/share/applications %{buildroot}/usr/share/icons/hicolor/256x256/apps
          cat > %{buildroot}/usr/share/applications/kelivo.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Kelivo
          Exec=/opt/kelivo/kelivo
          Icon=kelivo
          Type=Application
          Categories=Utility;
          DESKTOP
          cp kelivo.png %{buildroot}/usr/share/icons/hicolor/256x256/apps/kelivo.png
          %files
          /opt/kelivo/*
          /usr/bin/kelivo
          /usr/share/applications/kelivo.desktop
          /usr/share/icons/hicolor/256x256/apps/kelivo.png
          %changelog
          * $(date "+%a %b %d %Y") Psyche <your@email.com> - ${VERSION_NUMBER}-1
          - Release ${VERSION_NUMBER}
          EOF
          rpmbuild -bb ~/rpmbuild/SPECS/kelivo.spec
          cp ~/rpmbuild/RPMS/x86_64/kelivo-${VERSION_NUMBER}-1.*.rpm Kelivo_linux_${VERSION}.rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Linux-x86_64
          path: |
            Kelivo_linux_*.tar.gz
            Kelivo_linux_*.AppImage
            Kelivo_linux_*_amd64.deb
            Kelivo_linux_*.rpm

      - name: Publish release
        if: env.IS_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: ${{ github.event.inputs.release_tag || github.ref_name }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: |
            Kelivo_linux_*.tar.gz
            Kelivo_linux_*.AppImage
            Kelivo_linux_*_amd64.deb
            Kelivo_linux_*.rpm

  #############################################################################
  # Linux ARM64
  #############################################################################
  linux-arm64:
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.build_linux_arm64 == 'true')
    name: Linux ARM64 (tar.gz + AppImage + DEB + RPM)
    runs-on: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            clang cmake ninja-build pkg-config libgtk-3-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            libkeybinder-3.0-dev libayatana-appindicator3-dev \
            libmpg123-dev rpm patchelf libfuse2 file

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Inject fallback secrets
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Resolve version
        run: |
          RAW=$(grep 'version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          if [ "$IS_RELEASE" != "true" ]; then
            SHA=$(git rev-parse --short HEAD)
            VERSION="${RAW}_${SHA}"
          else
            VERSION="$RAW"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_NUMBER=$(echo $RAW | cut -d'+' -f1)" >> $GITHUB_ENV

      - run: flutter build linux --release

      - name: Package tar.gz
        run: |
          cd build/linux/arm64/release/bundle
          tar -czf ../../../../../Kelivo_linux_${VERSION}_arm64.tar.gz .

      - name: Package AppImage
        run: |
          wget -q -O appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-aarch64.AppImage"
          chmod +x appimagetool
          mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r build/linux/arm64/release/bundle/* AppDir/usr/bin/
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/kelivo" "$@"
          EOF
          chmod +x AppDir/AppRun
          cat > AppDir/kelivo.desktop << EOF
          [Desktop Entry]
          Name=Kelivo
          Exec=kelivo
          Icon=kelivo
          Type=Application
          Categories=Utility;
          EOF
          ICON="assets/app_icon.png"; [ -f "linux/kelivo.png" ] && ICON="linux/kelivo.png"
          install -Dm644 "$ICON" AppDir/kelivo.png
          install -Dm644 "$ICON" "AppDir/usr/share/icons/hicolor/256x256/apps/kelivo.png"
          ARCH=aarch64 ./appimagetool AppDir Kelivo_linux_${VERSION}_arm64.AppImage

      - name: Package DEB
        run: |
          mkdir -p deb/DEBIAN deb/opt/kelivo deb/usr/share/applications deb/usr/share/icons/hicolor/256x256/apps
          cp -r build/linux/arm64/release/bundle/* deb/opt/kelivo/
          cat > deb/DEBIAN/control << EOF
          Package: kelivo
          Version: ${VERSION_NUMBER}
          Section: utils
          Priority: optional
          Architecture: arm64
          Maintainer: Psyche <your@email.com>
          Depends: libgtk-3-0, libstdc++6, libglu1-mesa, libgstreamer1.0-0, libgstreamer-plugins-base1.0-0, libglib2.0-0, libc6
          Description: Kelivo - An LLM chat client
          EOF
          cat > deb/usr/share/applications/kelivo.desktop << EOF
          [Desktop Entry]
          Name=Kelivo
          Exec=/opt/kelivo/kelivo
          Icon=kelivo
          Type=Application
          Categories=Utility;
          EOF
          ICON="assets/app_icon.png"; [ -f "linux/kelivo.png" ] && ICON="linux/kelivo.png"
          install -Dm644 "$ICON" deb/usr/share/icons/hicolor/256x256/apps/kelivo.png
          dpkg-deb --build deb Kelivo_linux_${VERSION}_arm64.deb

      - name: Package RPM
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS} kelivo-${VERSION_NUMBER}
          cp -r build/linux/arm64/release/bundle/* kelivo-${VERSION_NUMBER}/
          ICON="assets/app_icon.png"; [ -f "linux/kelivo.png" ] && ICON="linux/kelivo.png"
          cp "$ICON" kelivo-${VERSION_NUMBER}/kelivo.png
          tar -czf ~/rpmbuild/SOURCES/kelivo-${VERSION_NUMBER}.tar.gz kelivo-${VERSION_NUMBER}
          cat > ~/rpmbuild/SPECS/kelivo.spec << EOF
          Name: kelivo
          Version: ${VERSION_NUMBER}
          Release: 1%{?dist}
          Summary: Kelivo LLM Chat Client
          License: MIT
          Source0: %{name}-%{version}.tar.gz
          BuildArch: aarch64
          Requires: gtk3, libstdc++ >= 6, mesa-libGLU, gstreamer1, gstreamer1-plugins-base, glib2, glibc
          %description
          An LLM chat client built with Flutter.
          %prep
          %setup -q
          %install
          mkdir -p %{buildroot}/opt/kelivo
          cp -r * %{buildroot}/opt/kelivo/
          mkdir -p %{buildroot}/usr/share/applications %{buildroot}/usr/share/icons/hicolor/256x256/apps
          cat > %{buildroot}/usr/share/applications/kelivo.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Kelivo
          Exec=/opt/kelivo/kelivo
          Icon=kelivo
          Type=Application
          Categories=Utility;
          DESKTOP
          cp kelivo.png %{buildroot}/usr/share/icons/hicolor/256x256/apps/kelivo.png
          %files
          /opt/kelivo/*
          /usr/share/applications/kelivo.desktop
          /usr/share/icons/hicolor/256x256/apps/kelivo.png
          %changelog
          * $(date "+%a %b %d %Y") Psyche <your@email.com> - ${VERSION_NUMBER}-1
          - Release ${VERSION_NUMBER}
          EOF
          rpmbuild -bb ~/rpmbuild/SPECS/kelivo.spec
          cp ~/rpmbuild/RPMS/aarch64/kelivo-${VERSION_NUMBER}-1.*.rpm Kelivo_linux_${VERSION}_arm64.rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Linux-ARM64
          path: |
            Kelivo_linux_*_arm64.tar.gz
            Kelivo_linux_*_arm64.AppImage
            Kelivo_linux_*_arm64.deb
            Kelivo_linux_*_arm64.rpm

      - name: Publish release
        if: env.IS_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: ${{ github.event.inputs.release_tag || github.ref_name }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: |
            Kelivo_linux_*_arm64.tar.gz
            Kelivo_linux_*_arm64.AppImage
            Kelivo_linux_*_arm64.deb
            Kelivo_linux_*_arm64.rpm