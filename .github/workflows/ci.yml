name: CI — Analyze, Format & Test

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.2'

jobs:
  quality:
    name: Analyze / Format / L10n / Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Linux deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            clang cmake ninja-build pkg-config libgtk-3-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libkeybinder-3.0-dev libayatana-appindicator3-dev \
            libmpg123-dev

      - name: Flutter pub get
        run: flutter pub get

      - name: Inject fallback secrets
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Dart format check (changed files)
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- 'lib/*.dart' 'test/*.dart' | grep '\.dart$' || true)"
          if [ -z "$files" ]; then
            echo "No changed Dart files to check."
            exit 0
          fi
          dart format $files
          # Check if any files were actually modified by the formatter
          modified="$(git diff --name-only)"
          if [ -n "$modified" ]; then
            echo "Formatting issues found in:"
            echo "$modified"
            git diff
            exit 1
          fi
          echo "All files are properly formatted."

      - name: Dart analyze (lib + test)
        run: dart analyze lib test

      - name: Run tests
        run: flutter test